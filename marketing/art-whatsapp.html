<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Guebly ReadMe Stats — WhatsApp</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #06080c 0%, #0d1117 40%, #160d2b 70%, #0d1117 100%);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px;
  }
  .glow {
    position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
    width: 700px; height: 350px;
    background: radial-gradient(ellipse, rgba(110,64,201,0.18) 0%, transparent 70%);
  }
  .content { position: relative; z-index: 1; text-align: center; }
  .logo {
    font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 60px;
    background: linear-gradient(135deg, #6E40C9 0%, #A855F7 50%, #22D3EE 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 16px;
  }
  .subtitle {
    font-family: 'Outfit', sans-serif; font-size: 24px; color: #7d8590;
    margin-bottom: 40px;
  }
  .highlight {
    font-family: 'Outfit', sans-serif; font-size: 36px; font-weight: 700;
    color: #e6edf3; margin-bottom: 16px;
  }
  .highlight span { color: #A855F7; }
  .desc {
    font-family: 'JetBrains Mono', monospace; font-size: 18px; color: #7d8590;
    margin-bottom: 40px; line-height: 1.6;
  }
  .url {
    font-family: 'JetBrains Mono', monospace; font-size: 22px;
    color: rgba(167,139,250,0.8);
    background: rgba(110,64,201,0.1); border: 1px solid rgba(110,64,201,0.25);
    border-radius: 12px; padding: 14px 32px;
    display: inline-block;
  }
</style>
</head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="content">
    <div class="logo">Guebly ReadMe Stats</div>
    <div class="subtitle">Cards de estatisticas pro seu GitHub</div>
    <div class="highlight"><span>14</span> tipos de card &middot; <span>70+</span> temas &middot; <span>100%</span> gratis</div>
    <div class="desc">Gere, customize e cole no seu README.<br>Open source. Funciona pra sempre.</div>
    <div class="url">readme.stats.guebly.com.br</div>
  </div>
</div>
</body>
</html>
