<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guebly ReadMe Stats — Twitter Art</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card {
    width: 1600px; height: 900px;
    background: linear-gradient(135deg, #06080c 0%, #0d1117 30%, #160d2b 60%, #0d1117 100%);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px;
  }
  .glow {
    position: absolute; top: -200px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 400px;
    background: radial-gradient(ellipse, rgba(110,64,201,0.2) 0%, transparent 70%);
  }
  .glow2 {
    position: absolute; bottom: -150px; right: -100px;
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(34,211,238,0.08) 0%, transparent 70%);
  }
  .grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(110,64,201,0.06) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(110,64,201,0.06) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  .content { position: relative; z-index: 1; text-align: center; }
  .logo {
    font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 72px;
    background: linear-gradient(135deg, #6E40C9 0%, #A855F7 50%, #22D3EE 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 16px;
  }
  .subtitle {
    font-family: 'JetBrains Mono', monospace; font-size: 24px; color: #7d8590;
    margin-bottom: 48px; letter-spacing: -0.02em;
  }
  .features {
    display: flex; gap: 24px; margin-bottom: 48px; flex-wrap: wrap; justify-content: center;
  }
  .feature {
    background: rgba(110,64,201,0.08); border: 1px solid rgba(110,64,201,0.2);
    border-radius: 12px; padding: 16px 28px;
    font-family: 'JetBrains Mono', monospace; font-size: 18px; color: #c9d1d9;
    display: flex; align-items: center; gap: 10px;
  }
  .feature .num {
    color: #A855F7; font-weight: 700; font-size: 22px;
  }
  .url {
    font-family: 'JetBrains Mono', monospace; font-size: 20px;
    color: rgba(167,139,250,0.7); margin-top: 8px;
  }
  .badges {
    display: flex; gap: 16px; margin-top: 32px; justify-content: center;
  }
  .badge {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 8px 20px;
    font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #7d8590;
  }
  .badge strong { color: #e6edf3; }
</style>
</head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="grid"></div>
  <div class="content">
    <div class="logo">Guebly ReadMe Stats</div>
    <div class="subtitle">Dynamic GitHub stats cards for your README</div>
    <div class="features">
      <div class="feature"><span class="num">14</span> Card Types</div>
      <div class="feature"><span class="num">70+</span> Themes</div>
      <div class="feature"><span class="num">17</span> Languages</div>
    </div>
    <div class="url">readme.stats.guebly.com.br</div>
    <div class="badges">
      <div class="badge"><strong>Open Source</strong> MIT License</div>
      <div class="badge"><strong>Free</strong> Forever</div>
      <div class="badge"><strong>Self-Hostable</strong> Vercel</div>
    </div>
  </div>
</div>
</body>
</html>
